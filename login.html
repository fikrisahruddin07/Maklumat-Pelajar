<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Maklumat - Log Masuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <nav class="bg-slate-900 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <span class="font-extrabold text-xl tracking-wider text-blue-400"> SISMAKLUMAT</span>
            <div class="space-x-6 font-medium">
                <a href="index.html" class="hover:text-blue-400 transition">Utama</a>
                <a href="daftar.html" class="hover:text-blue-400 transition">Daftar</a>
                <a href="login.html" class="text-blue-400 border-b-2 border-blue-400 pb-1">Log Masuk</a>
                <a href="carian.html" class="hover:text-blue-400 transition">Carian</a>
            </div>
        </div>
    </nav>

    <div class="w-full max-w-md mx-auto my-auto p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-3xl font-black text-center text-slate-800 mb-2">Selamat Kembali</h2>
        <p class="text-center text-slate-500 mb-6 text-sm">Log masuk untuk akses sistem penuh.</p>
        
        <!-- Mesej Status Log Masuk -->
        <div id="statusMessage" class="hidden p-4 rounded-xl mb-5 text-sm font-medium text-center shadow-sm"></div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Emel Pengguna</label>
                <input type="email" id="loginEmail" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" required>
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1">Kata Laluan</label>
                <input type="password" id="loginPassword" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-3.5 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Masuk Ke Sistem</button>
        </form>
    </div>

    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-sm mt-auto">
        &copy; 2026 Sistem Maklumat Prototip. Hak Cipta Terpelihara.
    </footer>
    <script src="js/api.js"></script>
</body>
</html>
