<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Maklumat - Carian</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <nav class="bg-slate-900 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <span class="font-extrabold text-xl tracking-wider text-blue-400"> SISMAKLUMAT</span>
            <div class="space-x-6 font-medium">
                <a href="index.html" class="hover:text-blue-400 transition">Utama</a>
                <a href="daftar.html" class="hover:text-blue-400 transition">Daftar</a>
                <a href="login.html" class="hover:text-blue-400 transition">Log Masuk</a>
                <a href="carian.html" class="text-blue-400 border-b-2 border-blue-400 pb-1">Carian</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl w-full mx-auto my-12 bg-white p-8 rounded-2xl shadow-xl border border-gray-100 flex-grow-0">
        <h2 class="text-3xl font-black text-slate-800 mb-2">Carian Rekod</h2>
        <p class="text-sm text-slate-500 mb-6">Cari data ahli/pelajar daripada pangkalan data pelayan API.</p>
        
        <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 mb-6">
            <input type="text" id="carianInput" placeholder="Masukkan nama (Contoh: Leanne / Ervin)..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition">
            <button id="btnCari" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md">Cari Data</button>
        </div>
        
        <div id="hasilCarian" class="border-t border-slate-100 pt-6">
            <p class="text-sm text-slate-400 italic text-center">Masukkan nama dan klik butang di atas untuk memulakan carian...</p>
        </div>
    </div>



    <footer class="bg-slate-900 text-slate-400 text-center py-4 text-sm mt-auto">
        &copy; 2026 Sistem Maklumat Prototip. Hak Cipta Terpelihara.
    </footer>
    <script src="js/api.js"></script> </body>
